<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="agentq architecture: N Claude Code sessions each wrapped by agentq wrap emit ApprovalEnvelopes over stdio into the local agentq serve daemon (bbolt store, HTTP + WebSocket on 127.0.0.1:7777); agentq attach prints a QR so the phone web UI drains the queue and sends answers back">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/></marker>
    <marker id="ah-dr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8985FF"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <!-- local-machine frame -->
  <rect x="24" y="28" width="610" height="308" rx="18" fill="none" stroke="#8985FF" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="50" font-size="13" font-weight="600" fill="#A6A2FF">your machine — no Docker, no SaaS, no external DB</text>

  <!-- connectors -->
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="240" y1="200" x2="312" y2="200" marker-end="url(#ah-d)"/>
    <line x1="612" y1="186" x2="700" y2="186" marker-end="url(#ah-d)"/>
  </g>
  <!-- answer return path -->
  <g stroke="#8985FF" stroke-opacity="0.6" stroke-width="1.4" fill="none">
    <path d="M700 214 L612 214" marker-end="url(#ah-dr)"/>
  </g>
  <text x="248" y="190" font-size="10.5" fill="#A1A1A8">stdio · ApprovalEnvelope</text>
  <text x="656" y="178" font-size="10.5" fill="#A1A1A8" text-anchor="middle">WebSocket</text>
  <text x="656" y="230" font-size="10.5" fill="#A6A2FF" text-anchor="middle">answer</text>

  <!-- Claude Code sessions -->
  <g>
    <rect x="48" y="88" width="192" height="224" rx="15" fill="#8985FF" fill-opacity="0.12" stroke="#8985FF" stroke-width="1.5"/>
    <text x="144" y="114" text-anchor="middle" font-size="15" font-weight="600" fill="#A6A2FF">agentq wrap</text>
    <text x="144" y="131" text-anchor="middle" font-size="10.5" fill="#A1A1A8">pty + stdio sniffer · per session</text>
    <g font-size="12" font-weight="600">
      <rect x="66" y="146" width="156" height="36" rx="9" fill="#8985FF" fill-opacity="0.20" stroke="#8985FF" stroke-width="1.1"/>
      <text x="144" y="169" text-anchor="middle" fill="#C4C2FF">claude #1</text>
      <rect x="66" y="190" width="156" height="36" rx="9" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.1"/>
      <text x="144" y="213" text-anchor="middle" fill="#C4C2FF">claude #2</text>
      <rect x="66" y="234" width="156" height="36" rx="9" fill="#8985FF" fill-opacity="0.12" stroke="#8985FF" stroke-width="1.1"/>
      <text x="144" y="257" text-anchor="middle" fill="#C4C2FF">claude #3</text>
      <text x="144" y="291" text-anchor="middle" font-size="11" font-weight="500" fill="#A1A1A8">… each asks "allow this?"</text>
    </g>
  </g>

  <!-- agentq serve daemon -->
  <g>
    <rect x="312" y="88" width="300" height="224" rx="15" fill="#4DA3FF" fill-opacity="0.12" stroke="#4DA3FF" stroke-width="1.6"/>
    <text x="462" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#7CBEFF">agentq serve — local daemon</text>
    <text x="462" y="132" text-anchor="middle" font-size="10.5" fill="#A1A1A8">127.0.0.1:7777 · bearer-token gated</text>
    <g font-size="12">
      <rect x="332" y="146" width="260" height="34" rx="9" fill="#000000" fill-opacity="0.30" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="346" y="168" fill="#D7E6F5"><tspan font-weight="700" fill="#7CBEFF">queue</tspan>  ULID-ordered, one-at-a-time</text>
      <rect x="332" y="186" width="260" height="34" rx="9" fill="#000000" fill-opacity="0.30" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="346" y="208" fill="#D7E6F5"><tspan font-weight="700" fill="#7CBEFF">store</tspan>  bbolt — envelopes + answers</text>
      <rect x="332" y="226" width="260" height="34" rx="9" fill="#000000" fill-opacity="0.30" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="346" y="248" fill="#D7E6F5"><tspan font-weight="700" fill="#7CBEFF">HTTP</tspan>  /api/envelopes · /api/queue</text>
    </g>
    <text x="462" y="288" text-anchor="middle" font-size="11" font-weight="500" fill="#7CBEFF">+ embedded SPA via embed.FS</text>
  </g>

  <!-- agentq attach + phone UI -->
  <g>
    <rect x="700" y="88" width="156" height="224" rx="15" fill="#2DC79A" fill-opacity="0.10" stroke="#2DC79A" stroke-width="1.5"/>
    <text x="778" y="114" text-anchor="middle" font-size="15" font-weight="600" fill="#5BE0BC">phone UI</text>
    <text x="778" y="131" text-anchor="middle" font-size="10.5" fill="#A1A1A8">over LAN</text>
    <!-- QR glyph -->
    <g fill="#5BE0BC">
      <rect x="730" y="146" width="44" height="44" rx="6" fill="#2DC79A" fill-opacity="0.18" stroke="#2DC79A" stroke-width="1.1"/>
      <rect x="737" y="153" width="9" height="9"/>
      <rect x="758" y="153" width="9" height="9"/>
      <rect x="737" y="174" width="9" height="9"/>
      <rect x="752" y="168" width="6" height="6"/>
      <rect x="760" y="176" width="7" height="7"/>
    </g>
    <text x="800" y="172" font-size="11" fill="#A1A1A8">scan</text>
    <text x="800" y="186" font-size="11" fill="#A1A1A8">to pair</text>
    <g font-size="11.5" font-weight="600">
      <rect x="718" y="206" width="120" height="34" rx="9" fill="#2DC79A" fill-opacity="0.22" stroke="#2DC79A" stroke-width="1.1"/>
      <text x="778" y="228" text-anchor="middle" fill="#5BE0BC">Approve  ✓</text>
      <rect x="718" y="248" width="120" height="34" rx="9" fill="#2DC79A" fill-opacity="0.12" stroke="#2DC79A" stroke-width="1.1"/>
      <text x="778" y="270" text-anchor="middle" fill="#5BE0BC">Deny  ✕</text>
    </g>
  </g>

  <!-- attach caption -->
  <text x="778" y="304" text-anchor="middle" font-size="10.5" fill="#A1A1A8">agentq attach prints the QR</text>
</svg>
